# Required stringData keys below.
#
# Optional — add when you enable matching ConfigMap flags:
#   OPENAI_API_KEY — FEATURE_VOICE_TRANSCRIPTION
#   LAVALINK_PASSWORD — FEATURE_MUSIC
#   SPOTIFY_CLIENT_ID, SPOTIFY_CLIENT_SECRET — FEATURE_MUSIC (Spotify playlists)
#   MINECRAFT_RCON_PASSWORD — FEATURE_MINECRAFT_WHITELIST (unless passwords live only in MINECRAFT_RCON_TARGETS)
apiVersion: v1
kind: Secret
metadata:
  name: ffo-bot
  namespace: ffo-bot
type: Opaque
stringData:
  DISCORD_BOT_TOKEN: "your-discord-bot-token-here"
  DISCORD_PUBLIC_KEY: "your-discord-public-key-here"
  DATABASE_URL: "postgresql://ffobot:password@postgres.database.svc.cluster.local:5432/ffobot"

  # OPENAI_API_KEY: "sk-..."
  # LAVALINK_PASSWORD: "youshallnotpass"
  # SPOTIFY_CLIENT_ID: "..."
  # SPOTIFY_CLIENT_SECRET: "..."
  # MINECRAFT_RCON_PASSWORD: "..."
