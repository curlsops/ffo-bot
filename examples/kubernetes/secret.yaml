apiVersion: v1
kind: Secret
metadata:
  name: ffo-bot
  namespace: ffo-bot
type: Opaque
stringData:
  # Required: Your Discord bot token
  DISCORD_BOT_TOKEN: "your-discord-bot-token-here"

  # Required: Your Discord application public key
  DISCORD_PUBLIC_KEY: "your-discord-public-key-here"

  # Required: PostgreSQL connection string
  # Format: postgresql://user:password@host:port/database
  DATABASE_URL: "postgresql://ffobot:password@postgres.database.svc.cluster.local:5432/ffobot"
