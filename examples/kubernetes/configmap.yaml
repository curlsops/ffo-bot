apiVersion: v1
kind: ConfigMap
metadata:
  name: ffo-bot
  namespace: ffo-bot
data:
  # Logging configuration
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

  # Health check server port
  HEALTH_CHECK_PORT: "8080"

  # Feature flags
  FEATURE_MEDIA_DOWNLOAD: "false"
  FEATURE_NOTIFIARR_MONITORING: "false"

  # Rate limiting
  RATE_LIMIT_USER_CAPACITY: "10"
  RATE_LIMIT_SERVER_CAPACITY: "100"

  # Cache settings
  CACHE_MAX_SIZE: "10000"
  CACHE_DEFAULT_TTL: "300"

  # Database pool
  DB_POOL_MIN_SIZE: "2"
  DB_POOL_MAX_SIZE: "10"

  # Shutdown timeout (seconds)
  SHUTDOWN_TIMEOUT_SECONDS: "30"
