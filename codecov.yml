codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "50...100"

  status:
    project:
      default:
        target: 80%
        threshold: 2%
        informational: false
      unittests:
        flags:
          - unittests
        target: 80%
        threshold: 2%
        informational: false
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: true
      unittests:
        flags:
          - unittests
        target: 70%
        threshold: 5%
        informational: true

component_management:
  default_rules:
    statuses:
      - type: project
        target: 80%
  individual_components:
    - component_id: media_downloader
      name: Media Downloader
      paths:
        - bot/processors/media_downloader.py
      statuses:
        - type: project
          target: 50%
          threshold: 5%
    - component_id: notifiarr_monitor
      name: Notifiarr Monitor
      paths:
        - bot/processors/notifiarr_monitor.py
      statuses:
        - type: project
          target: 50%
          threshold: 5%
    - component_id: client
      name: Bot Client
      paths:
        - bot/client.py
      statuses:
        - type: project
          target: 50%
          threshold: 5%

ignore:
  - "tests/**"
  - "database/migrations/**"
  - "**/__init__.py"
  - "build.*"
  - "setup.cfg"
  - "pyproject.toml"
  - "bot/commands/**"
  - "bot/handlers/**"
  - "config/logging_config.py"
  - "database/connection.py"

comment:
  layout: "reach,diff,flags,tree,components"
  behavior: default
  require_changes: false

flags:
  unittests:
    carryforward: true
