name: Edge Build

on:
  push:
    branches:
      - main
      - edge
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: edge-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: read
  actions: read

jobs:
  gate:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      mode: ${{ steps.pick.outputs.mode }}
    steps:
      - name: Pick verification mode
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_name }}" != "edge" || "${{ github.event_name }}" != "push" ]]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          n=$(gh pr list --repo "${{ github.repository }}" --head edge --base main --state open --json number --jq 'length')
          if [[ "${n}" -gt 0 ]]; then
            echo "mode=delegate" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: gate
    if: needs.gate.outputs.mode == 'full'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ffobot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify runs-on
        run: python scripts/check_workflow_runners.py

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ffobot_test
        run: |
          pytest tests/ -v -n auto --cov=bot --cov=config --cov=database --cov-report=term --cov-fail-under=100 --durations=10

  await-pr-ci:
    needs: gate
    if: needs.gate.outputs.mode == 'delegate'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Wait for CI workflow on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          sha="${{ github.sha }}"
          for attempt in $(seq 1 120); do
            rid=$(gh run list --repo "$repo" --commit "$sha" --workflow "CI" --json databaseId \
              | jq -r 'if (type == "array" and length > 0) then .[0].databaseId else empty end' 2>/dev/null || true)
            if [[ -z "$rid" || "$rid" == "null" ]]; then
              echo "waiting for CI run ($attempt/120)"
              sleep 10
              continue
            fi
            status=$(gh run view "$rid" --repo "$repo" --json status -q .status)
            conc=$(gh run view "$rid" --repo "$repo" --json conclusion -q .conclusion)
            if [[ "$status" == "completed" ]]; then
              if [[ "$conc" == "success" ]]; then
                exit 0
              fi
              echo "CI finished with conclusion=$conc" >&2
              exit 1
            fi
            sleep 10
          done
          echo "timed out waiting for CI" >&2
          exit 1

  build-and-push:
    needs: [gate, test, await-pr-ci]
    if: >-
      always() &&
      !failure() &&
      !cancelled() &&
      github.ref_name == 'edge' &&
      (
        (
          needs.gate.outputs.mode == 'full' &&
          needs.test.result == 'success' &&
          (needs.await-pr-ci.result == 'skipped' || needs.await-pr-ci.result == 'success')
        ) ||
        (
          needs.gate.outputs.mode == 'delegate' &&
          needs.test.result == 'skipped' &&
          needs.await-pr-ci.result == 'success'
        )
      )
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    environment: staging
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@ab5c1da94f53f5cd75c1038092aa276dddfccbba # v1.9.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Short SHA for tags
        id: sha
        run: echo "short=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "${GITHUB_OUTPUT}"

      - name: Build and push edge image
        uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8 # v2
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:edge
            ghcr.io/${{ github.repository }}:edge-${{ steps.sha.outputs.short }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot:edge
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot:edge-${{ steps.sha.outputs.short }}
          build-args: |
            FFO_BOT_VERSION=edge-${{ steps.sha.outputs.short }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          labels: |
            org.opencontainers.image.version=edge-${{ steps.sha.outputs.short }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          platforms: linux/amd64,linux/arm64
          sbom: true
