name: Release Please

on:
  push:
    branches:
      - main

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  build-and-push:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@ac083cc84672d01c60d5e8561d0a939b697de542 # v1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repo secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: useblacksmith/build-push-action@fb9e3e6a9299c78462bfadd0d93352c316adc9b8 # v2
        with:
          context: .
          build-args: |
            FFO_BOT_VERSION=${{ needs.release-please.outputs.version }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/${{ github.repository }}:${{ needs.release-please.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot:${{ needs.release-please.outputs.tag_name }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot:${{ needs.release-please.outputs.version }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot:latest
          labels: |
            org.opencontainers.image.version=${{ needs.release-please.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          platforms: linux/amd64,linux/arm64
          sbom: true

  upload-release-artifacts:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    environment: production
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Create package info artifact
        run: |
          GHCR="ghcr.io/${{ github.repository }}"
          DOCKERHUB="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot"
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${{ needs.release-please.outputs.version }}"
          jq -n \
            --arg pkg "ffo-bot" \
            --arg ver "$VERSION" \
            --arg imgGhcr "${GHCR}:${TAG}" \
            --arg imgDh "${DOCKERHUB}:${TAG}" \
            --arg imgGhcrVer "${GHCR}:${VERSION}" \
            --arg imgDhVer "${DOCKERHUB}:${VERSION}" \
            --arg imgGhcrLatest "${GHCR}:latest" \
            --arg imgDhLatest "${DOCKERHUB}:latest" \
            '{package:$pkg,version:$ver,docker_image:$imgGhcr,docker_image_dockerhub:$imgDh,tags:[$imgGhcr,$imgGhcrVer,$imgGhcrLatest,$imgDh,$imgDhVer,$imgDhLatest]}' \
            > release-package-info.json

      - name: Upload artifact to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} release-package-info.json
