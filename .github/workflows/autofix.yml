name: Autofix

on:
  workflow_call:

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    container:
      image: ghcr.io/${{ github.repository }}-ci:latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Run formatters
        uses: ./.github/actions/python-format
        with:
          check-only: "false"

      - name: Check for changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "arc-runner-curlsops[bot]"
          git config user.email "2968963+arc-runner-curlsops[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-format code with black and isort"
          git push
