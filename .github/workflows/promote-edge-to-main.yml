name: Promote Edge to Main

on:
  workflow_run:
    workflows: ["Edge Build"]
    types: [completed]
    branches: [edge]

concurrency:
  group: promote-edge-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  promote:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Merge edge into main
        run: |
          git fetch origin edge
          git merge origin/edge -m "chore: sync edge into main [automated]"
          git push origin main
