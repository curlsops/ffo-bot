name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: arc-runner-set
    container:
      image: python:3.12-slim

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ffobot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends git libpq-dev gcc
          pip install --no-cache-dir -r requirements-dev.txt

      - name: Run linters
        run: |
          flake8 bot/ config/ database/ main.py --count --statistics
          black --check bot/ config/ database/ main.py
          isort --check-only bot/ config/ database/ main.py

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@postgres:5432/ffobot_test
        run: |
          pytest tests/ -v --cov=bot --cov=config --cov=database --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          tags: ffobot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
