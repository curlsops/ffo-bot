name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: arc-runner-set
    container:
      image: ghcr.io/curlsops/ffo-bot-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ffobot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Run linters
        run: |
          flake8 bot/ config/ database/ main.py --count --statistics
          black --check bot/ config/ database/ main.py
          isort --check-only bot/ config/ database/ main.py

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@postgres:5432/ffobot_test
        run: |
          pytest tests/ -v --cov=bot --cov=config --cov=database --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ffobot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
