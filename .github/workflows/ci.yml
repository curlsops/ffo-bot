# CI uses pre-built ghcr.io/<repo>-ci:latest. Run build-ci-image on main first if the image does not exist.
name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    permissions:
      pull-requests: read
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            code:
              - 'bot/**'
              - 'config/**'
              - 'database/**'
              - 'main.py'
              - 'scripts/**'
              - 'Dockerfile'
              - 'requirements*.txt'
              - 'setup.cfg'
              - 'pyproject.toml'
              - 'alembic.ini'
              - '.github/images/ci/**'

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    container:
      image: ghcr.io/${{ github.repository }}-ci:latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure Git safe directory
        run: git config --global --add safe.directory '*'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run formatters
        run: |
          black bot/ config/ database/ main.py
          isort bot/ config/ database/ main.py

      - name: Commit and push format changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "arc-runner-curlsops[bot]"
            git config user.email "2968963+arc-runner-curlsops[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-format code with black and isort"
            git push
          fi

      - name: Fetch latest
        run: |
          git fetch origin ${{ github.head_ref || github.ref_name }}
          git checkout FETCH_HEAD

      - name: Run linters
        run: |
          flake8 bot/ config/ database/ main.py --count --statistics
          black --check bot/ config/ database/ main.py
          isort --check-only bot/ config/ database/ main.py
      - name: Run mypy
        run: mypy bot/ config/ database/ main.py

      - name: Run tests with coverage
        run: |
          pytest tests/ -v -n auto --cov=bot --cov=config --cov=database --cov-report=xml --cov-report=term --cov-fail-under=100 --durations=10

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage
          path: coverage.xml

  codecov:
    runs-on: ubuntu-24.04
    needs: test
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          config: .github/codecov.yml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-24.04
    needs: [test, filter]
    if: needs.filter.outputs.code == 'true'
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: false
          load: true
          tags: ffobot:${{ github.sha }}
          build-args: |
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container smoke test
        run: docker run --rm --entrypoint python ffobot:${{ github.sha }} smoke_test.py
