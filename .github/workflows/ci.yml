name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    permissions:
      pull-requests: read
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'bot/**'
              - 'config/**'
              - 'database/**'
              - 'main.py'
              - 'scripts/**'
              - 'Dockerfile'
              - 'requirements*.txt'
              - 'setup.cfg'
              - 'pyproject.toml'
              - 'alembic.ini'
              - '.github/images/ci/**'

  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    container:
      image: ghcr.io/${{ github.repository }}-ci:latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ffobot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@postgres:5432/ffobot_test
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements-dev.txt

      - name: Run linters
        run: |
          flake8 bot/ config/ database/ main.py --count --statistics
      - name: Check formatting
        uses: ./.github/actions/python-format
        with:
          check-only: "true"
      - name: Run mypy
        run: mypy bot/ config/ database/ main.py

      - name: Run tests with coverage
        run: |
          pytest tests/ -v -n auto --cov=bot --cov=config --cov=database --cov-report=xml --cov-report=term --cov-fail-under=100 --durations=10

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.xml

  codecov:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: test
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          codecov_yml_path: .github/codecov.yml
          fail_ci_if_error: false

  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [test, filter]
    if: needs.filter.outputs.code == 'true'
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@ac083cc84672d01c60d5e8561d0a939b697de542 # v1.7.0

      - name: Build Docker image
        uses: useblacksmith/build-push-action@cbd1f60d194a98cb3be5523b15134501eaf0fbf3 # v2
        with:
          context: .
          push: false
          load: true
          tags: ffobot:${{ github.sha }}
          build-args: |
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}

      - name: Container smoke test
        run: docker run --rm --entrypoint python ffobot:${{ github.sha }} smoke_test.py

      - name: Verify Kubernetes runAsUser 1000 can import deps (alembic)
        run: |
          docker run --rm -u 1000:1000 --entrypoint python ffobot:${{ github.sha }} \
            -c "import alembic; print('alembic import ok')"
