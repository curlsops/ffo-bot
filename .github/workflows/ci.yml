# CI uses pre-built ghcr.io/<repo>-ci:latest. Run build-ci-image on main first if the image does not exist.
name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    permissions:
      pull-requests: read
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'bot/**'
              - 'config/**'
              - 'database/**'
              - 'main.py'
              - 'scripts/**'
              - 'Dockerfile'
              - 'requirements*.txt'
              - 'setup.cfg'
              - 'pyproject.toml'
              - 'alembic.ini'
              - '.github/images/ci/**'

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    container:
      image: ghcr.io/${{ github.repository }}-ci:latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ffobot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@postgres:5432/ffobot_test
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run linters
        run: |
          flake8 bot/ config/ database/ main.py --count --statistics
      - name: Check formatting
        uses: ./.github/actions/python-format
        with:
          check-only: "true"
      - name: Run mypy
        run: mypy bot/ config/ database/ main.py

      - name: Run tests with coverage
        run: |
          pytest tests/ -v -n auto --cov=bot --cov=config --cov=database --cov-report=xml --cov-report=term --cov-fail-under=100 --durations=10

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage
          path: coverage.xml

  snyk-python:
    runs-on: ubuntu-24.04
    needs: [test, filter]
    if: needs.filter.outputs.code == 'true'
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Snyk to check for vulnerabilities
        continue-on-error: true
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk results to GitHub Code Scanning
        if: always() && hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          sarif_file: snyk.sarif

  codecov:
    runs-on: ubuntu-24.04
    needs: test
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          codecov_yml_path: .github/codecov.yml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-24.04
    needs: [test, filter]
    if: needs.filter.outputs.code == 'true'
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: false
          load: true
          tags: ffobot:${{ github.sha }}
          build-args: |
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container smoke test
        run: docker run --rm --entrypoint python ffobot:${{ github.sha }} smoke_test.py
