name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Run formatters
        run: |
          pip install black isort
          black bot/ config/ database/ main.py
          isort bot/ config/ database/ main.py

      - name: Commit and push format changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "arc-runner-curlsops[bot]"
            git config user.email "2968963+arc-runner-curlsops[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-format code with black and isort"
            git push
          fi

      - name: Fetch latest
        run: |
          git fetch origin ${{ github.head_ref || github.ref_name }}
          git checkout FETCH_HEAD

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run linters
        run: |
          flake8 bot/ config/ database/ main.py --count --statistics
          black --check bot/ config/ database/ main.py
          isort --check-only bot/ config/ database/ main.py

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=bot --cov=config --cov=database --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          load: true
          tags: ffobot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container smoke test
        run: docker run --rm --entrypoint python ffobot:${{ github.sha }} smoke_test.py
