name: Semantic Release

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      docker_ref:
        description: >-
          Git tag or SHA to build and push (e.g. v3.1.0). Leave empty to run semantic release on main only.
        required: false
        type: string
        default: ""
      update_latest:
        description: When using docker_ref, also push :latest to GHCR and Docker Hub.
        required: false
        type: boolean
        default: true

concurrency:
  group: semantic-release-main-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.docker_ref == ''
    outputs:
      released: ${{ steps.psr.outputs.released }}
      tag: ${{ steps.psr.outputs.tag }}
      version: ${{ steps.psr.outputs.version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Configure git to use RELEASE_TOKEN
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Semantic Release
        id: psr
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          build: "false"
          git_committer_name: "github-actions[bot]"
          git_committer_email: "github-actions[bot]@users.noreply.github.com"

  build-and-push:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          build-args: |
            FFO_BOT_VERSION=${{ needs.release.outputs.version }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.tag }}
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot:${{ needs.release.outputs.tag }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot:${{ needs.release.outputs.version }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot:latest
          labels: |
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          sbom: true

  docker-republish:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.docker_ref != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.docker_ref }}
          fetch-depth: 0

      - name: Resolve version and v-prefixed tag
        id: meta
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )
          REF="${{ github.event.inputs.docker_ref }}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if [[ "${REF}" == v* ]]; then
            echo "vtag=${REF}" >> "${GITHUB_OUTPUT}"
          else
            echo "vtag=v${VERSION}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Record image revision
        id: git
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Compose image tags
        id: dockertags
        env:
          REPO: ${{ github.repository }}
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          VTAG: ${{ steps.meta.outputs.vtag }}
          VERSION: ${{ steps.meta.outputs.version }}
          UPDATE_LATEST: ${{ github.event.inputs.update_latest }}
        run: |
          TAGS="ghcr.io/${REPO}:${VTAG}"$'\n'"ghcr.io/${REPO}:${VERSION}"$'\n'"docker.io/${DH_USER}/ffo-bot:${VTAG}"$'\n'"docker.io/${DH_USER}/ffo-bot:${VERSION}"
          if [ "${UPDATE_LATEST}" = "true" ]; then
            TAGS="${TAGS}"$'\n'"ghcr.io/${REPO}:latest"$'\n'"docker.io/${DH_USER}/ffo-bot:latest"
          fi
          {
            echo 'tags<<EOF'
            echo "${TAGS}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          build-args: |
            FFO_BOT_VERSION=${{ steps.meta.outputs.version }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          push: true
          tags: ${{ steps.dockertags.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ steps.git.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          sbom: true

  upload-release-artifacts:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: production
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Create package info artifact
        run: |
          GHCR="ghcr.io/${{ github.repository }}"
          DOCKERHUB="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot"
          TAG="${{ needs.release.outputs.tag }}"
          VERSION="${{ needs.release.outputs.version }}"
          jq -n \
            --arg pkg "ffo-bot" \
            --arg ver "$VERSION" \
            --arg imgGhcr "${GHCR}:${TAG}" \
            --arg imgDh "${DOCKERHUB}:${TAG}" \
            --arg imgGhcrVer "${GHCR}:${VERSION}" \
            --arg imgDhVer "${DOCKERHUB}:${VERSION}" \
            --arg imgGhcrLatest "${GHCR}:latest" \
            --arg imgDhLatest "${DOCKERHUB}:latest" \
            '{package:$pkg,version:$ver,docker_image:$imgGhcr,docker_image_dockerhub:$imgDh,tags:[$imgGhcr,$imgGhcrVer,$imgGhcrLatest,$imgDh,$imgDhVer,$imgDhLatest]}' \
            > release-package-info.json

      - name: Upload artifact to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release.outputs.tag }} release-package-info.json
