# Full releases from main: on push, weekly schedule, or manual trigger.
name: Semantic Release

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

concurrency:
  group: semantic-release-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    outputs:
      released: ${{ steps.psr.outputs.released }}
      tag: ${{ steps.psr.outputs.tag }}
      version: ${{ steps.psr.outputs.version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main

      - name: Semantic Release
        id: psr
        uses: python-semantic-release/python-semantic-release@v10.5.3
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          build: "false"

  build-and-push:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          build-args: |
            FFO_BOT_VERSION=${{ needs.release.outputs.version }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.tag }}
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot:${{ needs.release.outputs.tag }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot:${{ needs.release.outputs.version }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot:latest
          labels: |
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          sbom: true

  upload-release-artifacts:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: production
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Create package info artifact
        run: |
          GHCR="ghcr.io/${{ github.repository }}"
          DOCKERHUB="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ffo-bot"
          TAG="${{ needs.release.outputs.tag }}"
          VERSION="${{ needs.release.outputs.version }}"
          jq -n \
            --arg pkg "ffo-bot" \
            --arg ver "$VERSION" \
            --arg imgGhcr "${GHCR}:${TAG}" \
            --arg imgDh "${DOCKERHUB}:${TAG}" \
            --arg imgGhcrVer "${GHCR}:${VERSION}" \
            --arg imgDhVer "${DOCKERHUB}:${VERSION}" \
            --arg imgGhcrLatest "${GHCR}:latest" \
            --arg imgDhLatest "${DOCKERHUB}:latest" \
            '{package:$pkg,version:$ver,docker_image:$imgGhcr,docker_image_dockerhub:$imgDh,tags:[$imgGhcr,$imgGhcrVer,$imgGhcrLatest,$imgDh,$imgDhVer,$imgDhLatest]}' \
            > release-package-info.json

      - name: Upload artifact to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release.outputs.tag }} release-package-info.json
