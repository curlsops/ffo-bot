[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    venv,
    .venv,
    env,
    .env,
    build,
    dist,
    *.egg-info,
    database/migrations/versions
ignore =
    # E203: whitespace before ':'
    E203,
    # E501: line too long (handled by black)
    E501,
    # W503: line break before binary operator
    W503,
    # W391: blank line at end of file
    W391,
per-file-ignores =
    __init__.py:F401
    smoke_test.py:F401

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
filterwarnings =
    ignore:Core Pydantic V1 functionality isn't compatible with Python 3.14:UserWarning
asyncio_default_fixture_loop_scope = function
addopts =
    --verbose
    --strict-markers
    --tb=short
    -m "not slow"
    --cov=bot
    --cov=config
    --cov=database
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

[coverage:run]
branch = True
source = bot,config,database
omit =
    */__init__.py
    */migrations/*
    tests/*
    bot/commands/*
    bot/handlers/*
    config/logging_config.py
    database/connection.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    if __name__ == .__main__.:
fail_under = 100
show_missing = True
precision = 2

[coverage:html]
directory = htmlcov

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
strict_optional = True

[mypy-discord.*]
ignore_missing_imports = True

[mypy-asyncpg.*]
ignore_missing_imports = True

[mypy-aiofiles.*]
ignore_missing_imports = True

[isort]
profile = black
line_length = 100
skip_gitignore = True
known_first_party = bot,config,database
