[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    venv,
    .venv,
    env,
    .env,
    build,
    dist,
    *.egg-info,
    database/migrations/versions
ignore =
    # E203: whitespace before ':'
    E203,
    # E501: line too long (handled by black)
    E501,
    # W503: line break before binary operator
    W503,
    # W391: blank line at end of file
    W391,
per-file-ignores =
    __init__.py:F401
    smoke_test.py:F401

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
filterwarnings =
    ignore:Core Pydantic V1 functionality isn't compatible with Python 3.14:UserWarning
asyncio_default_fixture_loop_scope = function
addopts =
    --verbose
    --strict-markers
    --tb=short
    -m "not slow"
    --cov=bot
    --cov=config
    --cov=database
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

[coverage:run]
branch = True
source = bot,config,database
omit =
    */__init__.py
    */migrations/*
    tests/*
    bot/commands/*
    bot/handlers/*
    config/logging_config.py
    database/connection.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    if __name__ == .__main__.:
fail_under = 100
show_missing = True
precision = 2

[coverage:html]
directory = htmlcov

[mypy]
python_version = 3.11
exclude = database/migrations
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
strict_optional = True

[mypy-discord.*]
ignore_missing_imports = True

[mypy-asyncpg]
ignore_missing_imports = True
follow_imports = skip

[mypy-aiofiles]
ignore_missing_imports = True
follow_imports = skip

[mypy-alembic]
ignore_missing_imports = True

[mypy-sqlalchemy]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-pydantic_settings.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-mafic.*]
ignore_missing_imports = True

[mypy-nacl.*]
ignore_missing_imports = True

[mypy-prometheus_client]
ignore_missing_imports = True

[mypy-pythonjsonlogger]
ignore_missing_imports = True

[mypy-pythonjsonlogger.json]
ignore_missing_imports = True

[mypy-spacy]
ignore_missing_imports = True

[mypy-bot.utils.pagination]
disable_error_code = method-assign, assignment, attr-defined, var-annotated, union-attr

[mypy-bot.views.giveaway]
disable_error_code = method-assign, assignment, attr-defined, var-annotated, union-attr, arg-type

[mypy-bot.commands.music]
disable_error_code = method-assign, attr-defined, var-annotated, arg-type, union-attr, return-value, call-overload, assignment

[mypy-bot.utils.collector]
disable_error_code = attr-defined, union-attr

[mypy-bot.utils.discord_helpers]
disable_error_code = return-value

[mypy-bot.utils.notifier]
disable_error_code = return-value, arg-type

[mypy-bot.handlers.moderation]
disable_error_code = attr-defined

[mypy-bot.handlers.edit_tracking]
disable_error_code = union-attr

[mypy-bot.handlers.reactions]
disable_error_code = attr-defined, arg-type

[mypy-bot.handlers.messages]
disable_error_code = union-attr

[mypy-bot.commands.help_cmd]
disable_error_code = union-attr

[mypy-bot.commands.admin]
disable_error_code = arg-type

[mypy-bot.commands.faq]
disable_error_code = arg-type

[mypy-bot.commands.permissions]
disable_error_code = arg-type, method-assign, attr-defined, var-annotated, return-value

[mypy-bot.tasks.status_rotator]
disable_error_code = attr-defined

[mypy-bot.commands.reaction_roles]
disable_error_code = arg-type

[mypy-bot.commands.polls]
disable_error_code = union-attr, arg-type

[mypy-bot.commands.reactbot]
disable_error_code = arg-type

[mypy-bot.commands.quotebook]
disable_error_code = arg-type, attr-defined

[mypy-bot.commands.giveaway]
disable_error_code = func-returns-value, arg-type, attr-defined

[mypy-bot.commands.anonymous]
disable_error_code = attr-defined, union-attr, arg-type, override

[mypy-main]
disable_error_code = call-arg

[mypy-bot.utils.music]
disable_error_code = attr-defined

[mypy-bot.commands.whitelist]
disable_error_code = attr-defined, arg-type

[mypy-bot.tasks.giveaway_manager]
disable_error_code = method-assign, attr-defined, var-annotated, arg-type, union-attr

[mypy-bot.utils.anonymize]
disable_error_code = assignment

[mypy-bot.client]
disable_error_code = var-annotated, arg-type, assignment, method-assign, union-attr

[isort]
profile = black
line_length = 100
skip_gitignore = True
known_first_party = bot,config,database
